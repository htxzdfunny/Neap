name: Build Neap Multi-Platform

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  # Android: ubuntu-latest
  # ─────────────────────────────────────────────
  build-android:
    name: Build Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.x'
          channel: 'stable'
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      # ── Android 签名配置 ──────────────────────
      # 如果仓库 Secrets 中存在 KEYSTORE_BASE64 与 KEY_PROPERTIES，
      # 则还原签名文件；否则生成 Dummy 配置以保证 Gradle 能正常同步。
      # 正式发布时请务必配置真实的签名 Secrets。
      - name: Configure Android Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_PROPERTIES: ${{ secrets.KEY_PROPERTIES }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ] && [ -n "$KEY_PROPERTIES" ]; then
            echo "✅ Restoring release keystore from secrets..."
            echo "$KEY_PROPERTIES" > android/app/key.properties
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks
          else
            echo "⚠️  No keystore secrets found. Using dummy config (APK will not be installable)."
            cat <<EOF > android/app/key.properties
          storePassword=dummy
          keyPassword=dummy
          keyAlias=dummy
          storeFile=dummy.jks
          EOF
            touch android/app/dummy.jks
          fi

      # 按照 README 推荐命令：split-per-abi + obfuscate
      - name: Build Android APK (split-per-abi)
        run: |
          flutter build apk \
            --split-debug-info=build/debug-info \
            --obfuscate \
            --split-per-abi

      - name: Upload Android APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: build/app/outputs/flutter-apk/app-*-release.apk

  # ─────────────────────────────────────────────
  # Windows: windows-latest
  # ─────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.x'
          channel: 'stable'
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Enable Windows desktop support
        run: flutter config --enable-windows-desktop

      - name: Build Windows App
        run: flutter build windows --release

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Build
          path: build/windows/x64/runner/Release/

  # ─────────────────────────────────────────────
  # Linux: ubuntu-latest
  # ─────────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Flutter Linux 桌面构建所需的系统依赖
      - name: Install Linux desktop build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            pkg-config \
            libgtk-3-dev \
            liblzma-dev \
            libstdc++-12-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.x'
          channel: 'stable'
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Enable Linux desktop support
        run: flutter config --enable-linux-desktop

      - name: Build Linux App
        run: flutter build linux --release

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Linux-Build
          path: build/linux/x64/release/bundle/

  # ─────────────────────────────────────────────
  # macOS: macos-latest
  # ─────────────────────────────────────────────
  build-macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.x'
          channel: 'stable'
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Enable macOS desktop support
        run: flutter config --enable-macos-desktop

      - name: Build macOS App
        run: flutter build macos --release

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macOS-Build
          path: build/macos/Build/Products/Release/*.app
